<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | PAC SWIFT Framework</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --navy: #002D6A;
      --navy-light: #0A0F1C;
      --gold: #0ABFBC;
      --gold-light: #4A8FE7;
      --cream: #F4F7FB;
      --cream-dark: #E8EDF5;
      --text: #0A0F1C;
      --text-muted: #6B7A96;
      --white: #FFFFFF;
      --border: #B8C4D4;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--navy-light);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .login-wrap {
      width: 100%;
      max-width: 420px;
    }
    .login-logo {
      text-align: center;
      margin-bottom: 36px;
    }
    .login-logo .badge {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      background: rgba(10,191,188,0.12);
      border: 1px solid var(--gold);
      border-radius: 12px;
      padding: 16px 28px;
      margin-bottom: 18px;
    }
    .login-logo .badge .s {
      font-family: 'DM Serif Display', serif;
      font-size: 32px;
      color: var(--gold);
      line-height: 1;
    }
    .login-logo .badge .label {
      font-size: 10px;
      letter-spacing: 3px;
      color: rgba(255,255,255,0.6);
      text-transform: uppercase;
      margin-top: 4px;
      font-weight: 600;
    }
    .login-logo h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 26px;
      color: var(--white);
      line-height: 1.2;
    }
    .login-logo h1 em {
      font-style: italic;
      color: var(--gold-light);
    }
    .login-logo p {
      font-size: 14px;
      color: rgba(255,255,255,0.45);
      margin-top: 8px;
    }
    .login-card {
      background: #111827;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 36px 32px;
    }
    .login-card h2 {
      font-family: 'DM Serif Display', serif;
      font-size: 22px;
      color: var(--white);
      margin-bottom: 6px;
    }
    .login-card .subtitle {
      font-size: 13px;
      color: rgba(255,255,255,0.4);
      margin-bottom: 28px;
    }
    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
      margin-bottom: 8px;
    }
    .form-group input {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1.5px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      padding: 12px 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      color: var(--white);
      transition: border-color 0.2s;
      outline: none;
    }
    .form-group input::placeholder {
      color: rgba(255,255,255,0.2);
    }
    .form-group input:focus {
      border-color: var(--gold);
      background: rgba(10,191,188,0.05);
    }
    .login-error {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: #fca5a5;
      margin-bottom: 16px;
      display: none;
    }
    .btn-login {
      width: 100%;
      background: var(--gold);
      color: var(--navy);
      border: none;
      border-radius: 10px;
      padding: 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 8px;
      letter-spacing: 0.3px;
    }
    .btn-login:hover {
      background: #08a8a5;
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(10,191,188,0.35);
    }
    .btn-login:active {
      transform: translateY(0);
    }
    .login-footer {
      margin-top: 20px;
      text-align: center;
      font-size: 13px;
      color: rgba(255,255,255,0.3);
      line-height: 1.6;
    }
    .login-footer a {
      color: rgba(255,255,255,0.5);
    }
  </style>
</head>
<body>

  <div class="login-wrap">
    <div class="login-logo">
      <div class="badge">
        <div class="s">SWIFT</div>
        <div class="label">PAC Framework</div>
      </div>
      <h1>SWIFT Framework — <em>Pace of Love</em></h1>
      <p>Product Architect Coaching · By John Yeo</p>
    </div>

    <div class="login-card">
      <h2>Sign in</h2>
      <p class="subtitle">Enter your credentials to continue</p>

      <div class="login-error" id="loginError">Incorrect username or password.</div>

      <div class="form-group">
        <label>Username</label>
        <input type="text" id="loginUsername" placeholder="Enter your username" autocomplete="username" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="Enter your password" autocomplete="current-password" />
      </div>

      <button class="btn-login" onclick="doLogin()">Sign In</button>

      <p class="login-footer">No account? Contact John to get access.</p>
    </div>
  </div>

  <script>
    // Redirect if already logged in
    (function() {
      try {
        var s = JSON.parse(localStorage.getItem('pac-swift-session'));
        if (s && s.u) window.location.replace('index.html');
      } catch(e) {}
    })();

    function getUsers() {
      try { return JSON.parse(localStorage.getItem('pac-swift-users') || '{}'); } catch(e) { return {}; }
    }

    function doLogin() {
      var username = document.getElementById('loginUsername').value.trim();
      var password = document.getElementById('loginPassword').value;
      var errorEl = document.getElementById('loginError');

      errorEl.style.display = 'none';

      if (!username || !password) {
        errorEl.style.display = 'block';
        return;
      }

      // Check master account
      if (username === 'johnyeo' && password === '2706') {
        localStorage.setItem('pac-swift-session', JSON.stringify({ u: 'johnyeo', role: 'admin' }));
        window.location.href = 'index.html';
        return;
      }

      // Check stored users
      var users = getUsers();
      if (users[username] && users[username].password === password) {
        localStorage.setItem('pac-swift-session', JSON.stringify({ u: username, role: users[username].role || 'user' }));
        window.location.href = 'index.html';
        return;
      }

      errorEl.style.display = 'block';
    }

    // Allow Enter key to submit
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') doLogin();
    });
  </script>
</body>
</html>
